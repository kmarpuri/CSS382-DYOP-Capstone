# fly.toml app configuration file generated for capstone-uwb on 2026-06-01T20:36:27-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'capstone-uwb'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  CAPSTONE_LLM_BACKEND = 'groq'
  CAPSTONE_LLM_MODEL = 'llama-3.3-70b-versatile'
  CAPSTONE_SKIP_FIRSTRUN = '1'
  PORT = '8765'

[[mounts]]
  source = 'capstone_data'
  destination = '/home/capstone/data'

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
