name: Deploy to Fly.io

# Auto-deploy the app whenever code lands on main (e.g. a merged PR).
# Requires a repo secret named FLY_API_TOKEN (see README / setup steps).
on:
  push:
    branches:
      - main
  workflow_dispatch:        # also allow manual runs from the Actions tab

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # Never run two deploys at once; cancel an in-progress one if a newer
    # push arrives.
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
